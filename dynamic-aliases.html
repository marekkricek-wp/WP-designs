<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiseporter – Dynamic Aliases</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --blue:#00539a;
  --blue-border:#1770c8;
  --blue-lt:#e6f7ff;
  --t1:#212121;
  --t2:#525252;
  --bd:#dfdfdf;
  --bg:#f0f0f0;
  --white:#fff;
  --hh:45px;
  --sw:240px;
  --ease:300ms cubic-bezier(.4,0,.2,1);
  /* CSS filter to tint black icon PNG → #00539a */
  --icon-active:invert(25%) sepia(75%) saturate(685%) hue-rotate(181deg) brightness(95%) contrast(103%);
}
body{font-family:'Roboto',system-ui,sans-serif;font-size:14px;color:var(--t1);height:100vh;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}

/* ── HEADER ── */
.hdr{height:var(--hh);background:#fff;border-bottom:1px solid var(--bd);display:flex;align-items:stretch;flex-shrink:0;z-index:100;position:relative;}
.logo{display:flex;align-items:center;padding:0 12px 0 24px;flex-shrink:0;}
.logo img{height:26px;width:117px;display:block;object-fit:contain;}
.l1-nav{display:flex;align-items:stretch;}
.l1t{display:flex;align-items:center;padding:0 16px;font-size:14px;line-height:20px;color:var(--t2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;position:relative;top:1px;white-space:nowrap;font-family:'Roboto',sans-serif;}
.l1t:hover{color:var(--t1);}
.l1t.on{color:var(--blue);border-bottom-color:var(--blue-border);}
.hdr-r{margin-left:auto;display:flex;align-items:center;padding:0 16px;gap:0;}
.ibtn{width:32px;height:32px;border:none;background:none;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:6px;flex-shrink:0;}
.ibtn:hover{background:#f5f5f5;}
.ibtn img{width:20px;height:20px;display:block;object-fit:contain;}

/* ── BODY ── */
.app-body{display:flex;flex:1;overflow:hidden;position:relative;}

/* ── SIDEBAR ── */
.sidebar{width:var(--sw);background:#fff;border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;z-index:10;}
.sb-nav{flex:1;padding:8px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;}
.ni{display:flex;align-items:center;padding:4px 16px 4px 8px;gap:8px;cursor:pointer;color:var(--t2);border-radius:4px;transition:background .1s,color .1s;user-select:none;font-size:14px;line-height:20px;}
.ni:hover{background:#f5f5f5;color:var(--t1);}
.ni.on{background:var(--blue-lt);color:var(--blue);}
.ni .ico{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:4px;flex-shrink:0;}
.ni .ico img{width:20px;height:20px;display:block;object-fit:contain;}
.ni.on .ico img{filter:var(--icon-active);}
.sb-foot{padding:4px 16px 4px 8px;height:44px;display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--t2);font-size:14px;flex-shrink:0;margin:0 8px 8px;}
.sb-foot:hover{color:var(--t1);}
.sb-foot img{width:20px;height:20px;object-fit:contain;}

/* ── CANVAS ── */
.canvas{flex:1;overflow-y:auto;padding:14px 24px 24px;position:relative;}
.pg-title{font-size:28px;font-weight:700;margin-bottom:14px;line-height:1.2;color:var(--t1);}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.btn-p{display:inline-flex;align-items:center;gap:5px;height:32px;padding:0 14px;background:#1770c8;color:#fff;border:none;border-radius:4px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:'Roboto',sans-serif;}
.btn-p:hover{background:#1565b0;}
.btn-s{display:inline-flex;align-items:center;gap:5px;height:32px;padding:0 12px;background:#fff;color:var(--t1);border:1px solid var(--bd);border-radius:4px;font-size:14px;cursor:pointer;white-space:nowrap;font-family:'Roboto',sans-serif;}
.btn-s:hover{background:#f5f5f5;}
.sbox{display:flex;align-items:center;height:32px;border:1px solid var(--bd);border-radius:4px;padding:0 10px;gap:6px;background:#fff;}
.sbox input{border:none;outline:none;font-size:14px;color:var(--t1);width:160px;background:transparent;font-family:'Roboto',sans-serif;}
.sep-v{width:1px;height:18px;background:var(--bd);}

/* ── TABLE ── */
.tbl-wrap{background:#fff;border:1px solid var(--bd);border-radius:4px;overflow:hidden;}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{height:48px;padding:0 16px;text-align:left;font-size:14px;font-weight:500;color:var(--t1);border-bottom:1px solid var(--bd);white-space:nowrap;}
.tbl td{height:40px;padding:0 16px;font-size:14px;color:var(--t1);border-bottom:1px solid var(--bd);white-space:nowrap;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tbody tr{cursor:pointer;transition:background .08s;}
.tbl tbody tr:hover{background:#f5f9ff;}
.tbl tbody tr.sel{background:var(--blue-lt);}
.tbl td.dim{color:var(--t2);}
.chip{display:inline-flex;align-items:center;height:20px;padding:0 7px;border-radius:10px;background:#eee;color:#424242;font-size:12px;white-space:nowrap;margin-right:3px;}
.chip-dk{display:inline-flex;align-items:center;height:22px;padding:0 8px;border-radius:11px;background:#424242;color:#fff;font-size:12px;gap:4px;white-space:nowrap;}
.chip-dk .cx{cursor:pointer;opacity:.7;}
.fi{display:inline-flex;align-items:center;height:32px;padding:0 10px;border:1px solid var(--bd);border-radius:4px;background:#fff;font-size:13px;gap:5px;cursor:pointer;}
.fi:hover{background:#f5f5f5;}
.cb{width:16px;height:16px;border:1.5px solid #bdbdbd;border-radius:2px;cursor:pointer;flex-shrink:0;}
.state-b{display:inline-flex;align-items:center;height:26px;padding:0 9px;border-radius:4px;background:#424242;color:#fff;font-size:12px;gap:4px;cursor:pointer;border:none;font-family:'Roboto',sans-serif;white-space:nowrap;}
.label-chip{display:inline-flex;align-items:center;height:20px;padding:0 7px;border-radius:10px;background:#e8e8e8;color:#424242;font-size:12px;white-space:nowrap;}
.pg-bar{display:flex;align-items:center;justify-content:space-between;height:48px;padding:0 16px;border-top:1px solid var(--bd);font-size:13px;color:var(--t2);}
.pg-nums{display:flex;align-items:center;gap:2px;}
.pg-n{width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12.5px;border-radius:3px;cursor:pointer;}
.pg-n.cur{background:var(--blue-border);color:#fff;}
.pg-n:not(.cur):hover{background:#f5f5f5;}
.pg-sel{height:28px;border:1px solid var(--bd);border-radius:4px;font-size:13px;padding:0 6px;font-family:'Roboto',sans-serif;color:var(--t1);background:#fff;}

/* ── DRAWER ── */
.dr-host{position:absolute;inset:0;pointer-events:none;z-index:50;overflow:hidden;}
.dr-host.open{pointer-events:auto;}
.drawer{position:absolute;top:0;right:0;width:900px;max-width:100%;height:100%;background:#fff;border-left:1px solid var(--bd);display:flex;flex-direction:column;transform:translateX(100%);transition:transform var(--ease);box-shadow:-3px 0 24px rgba(0,0,0,.10);}
.drawer.open{transform:translateX(0);}
/* top action bar - NO border below */
.dr-top{height:46px;display:flex;align-items:center;padding:0 16px;gap:2px;flex-shrink:0;}
.dr-top .sp{flex:1;}
.dr-title{font-size:26px;font-weight:700;padding:10px 24px 0;color:var(--t1);line-height:1.25;}
.dr-tabs{display:flex;align-items:stretch;height:42px;padding:0 24px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.dr-tab{display:flex;align-items:center;padding:0 16px;font-size:14px;color:var(--t2);border:none;background:none;border-bottom:2px solid transparent;cursor:pointer;position:relative;top:1px;white-space:nowrap;font-family:'Roboto',sans-serif;}
.dr-tab:hover{color:var(--t1);}
.dr-tab.on{color:var(--blue);border-bottom-color:var(--blue-border);}
.dr-body{flex:1;overflow-y:auto;padding:20px 24px;}
.dr-foot{display:flex;align-items:center;height:60px;padding:0 24px;gap:8px;border-top:1px solid var(--bd);flex-shrink:0;}

/* FORM INSIDE DRAWERS */
.sec{font-size:14px;font-weight:600;margin:20px 0 8px;color:var(--t1);}
.sec:first-child{margin-top:0;}
.subsec{font-size:14px;font-weight:600;margin:16px 0 8px;color:var(--t1);}
.field{display:flex;align-items:flex-start;padding:5px 0;gap:16px;min-height:36px;}
.fl{width:241px;flex-shrink:0;font-size:14px;color:var(--t2);padding-top:7px;line-height:20px;}
.fv{flex:1;}
.inp{width:100%;height:32px;background:#f5f5f5;border:1px solid transparent;border-radius:4px;padding:0 12px;font-size:14px;color:var(--t1);font-family:'Roboto',sans-serif;outline:none;}
.inp:focus{border-color:var(--blue-border);background:#fff;}
.dd-fake{width:100%;height:32px;background:#f5f5f5;border:1px solid var(--bd);border-radius:4px;padding:0 10px 0 12px;font-size:14px;color:var(--t1);cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;}
.tog{position:relative;display:inline-block;width:40px;height:22px;cursor:pointer;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;position:absolute;}
.tsl{position:absolute;inset:0;background:#9e9e9e;border-radius:22px;transition:background .2s;}
.tsl:before{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;left:2px;top:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.tog input:checked+.tsl{background:var(--blue-border);}
.tog input:checked+.tsl:before{transform:translateX(18px);}

/* VALUE FORMAT DROPDOWN */
.dd{position:relative;width:100%;}
.dd-t{width:100%;height:32px;background:#f5f5f5;border:1px solid var(--bd);border-radius:4px;padding:0 10px 0 12px;font-size:14px;color:var(--t1);cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
.dd-t.open{border-color:var(--blue-border);background:#fff;}
.dd-menu{position:absolute;left:0;right:0;background:#fff;border:1px solid var(--bd);border-radius:4px;box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:300;overflow:hidden;margin-top:2px;}
.dd-opt,.dd-opt-it{display:flex;align-items:center;height:36px;padding:0 12px;font-size:14px;cursor:pointer;gap:8px;}
.dd-opt:hover,.dd-opt-it:hover{background:#f5f9ff;}
.dd-opt.cur,.dd-opt-it.cur{color:var(--blue);}

/* PRODUCT DRAWER */
.dr-meta{display:flex;align-items:center;gap:14px;padding:2px 24px 0;flex-wrap:wrap;}
.dr-meta-tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--t2);}
/* Fragment cards */
.frag{border:1px solid var(--bd);border-radius:4px;margin-bottom:12px;overflow:hidden;}
.frag-hdr{display:flex;align-items:center;justify-content:space-between;padding:0 12px;height:36px;font-size:14px;font-weight:500;cursor:pointer;}
.frag-hdr svg{width:16px;height:16px;color:var(--t2);flex-shrink:0;}
.frag-body{padding:8px 0;}
.attr-row{display:flex;align-items:center;min-height:32px;padding:0 16px;gap:12px;}
.attr-lbl{width:212px;flex-shrink:0;font-size:14px;color:var(--t2);}
.attr-val{flex:1;display:flex;align-items:center;gap:6px;}
.attr-inp{flex:1;height:32px;background:#f5f5f5;border:1px solid transparent;border-radius:4px;padding:0 10px;font-size:14px;color:var(--t1);font-family:'Roboto',sans-serif;outline:none;}
.attr-inp:focus{border-color:var(--blue-border);background:#fff;}
.lang-tag{display:inline-flex;align-items:center;height:20px;padding:0 5px;background:#e0e0e0;border-radius:2px;font-size:11px;font-weight:500;color:#424242;flex-shrink:0;}
/* Identifiers */
.id-row{display:flex;align-items:center;min-height:32px;padding:0 16px;gap:8px;}
.id-lbl{font-size:14px;color:var(--t2);flex:1;}
.id-lbl.bold{color:var(--t1);font-weight:500;}
.id-chip{display:inline-flex;align-items:center;height:24px;padding:0 8px;background:#f0f0f0;border-radius:4px;font-size:12px;gap:4px;flex-shrink:0;}
.id-chip .cx{color:#757575;cursor:pointer;font-size:13px;}
.add-btn{width:22px;height:22px;border-radius:50%;border:1px solid var(--bd);background:#fff;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:16px;flex-shrink:0;}
.id-child{padding-left:28px;}
.frag-sec-title{font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:space-between;padding:4px 0 10px;}
.draft-badge{display:inline-flex;align-items:center;height:28px;padding:0 10px;border:1px solid var(--bd);border-radius:4px;font-size:13px;gap:5px;cursor:pointer;white-space:nowrap;}

/* HINT (below input) */
.hint{font-size:12px;color:var(--t2);padding:4px 0 2px;line-height:16px;}
.hint strong{color:var(--t1);}

/* TOOLTIP */
.tt-wrap{position:relative;display:inline-flex;align-items:center;}
.tt-icon{width:16px;height:16px;border-radius:50%;border:1.5px solid #9e9e9e;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#9e9e9e;cursor:help;flex-shrink:0;line-height:1;user-select:none;}
.tt-box{display:none;position:absolute;left:22px;top:-4px;width:280px;background:#424242;color:#fff;font-size:12px;border-radius:4px;padding:10px 12px;line-height:1.6;z-index:400;white-space:normal;pointer-events:none;}
.tt-box code{background:rgba(255,255,255,.18);padding:1px 5px;border-radius:3px;font-family:monospace;font-size:11px;}
.tt-wrap:hover .tt-box{display:block;}

/* PRODUCT DRAWER – fragment body uses standard field layout */
.frag-body .field{padding:5px 16px;}
</style>
</head>

/* ══ HELPERS ══ */
function getHintPreview(v, input){
  const mc='TYPE_PERFUME', vc='VAR_001', val=input||'…';
  if(v==='prefix-mc') return val==='…'?`…_${mc}`:`${val}_${mc}`;
  if(v==='prefix-vc') return val==='…'?`…_${vc}`:`${val}_${vc}`;
  if(v==='mc-suffix') return val==='…'?`${mc}_…`:`${mc}_${val}`;
  if(v==='vc-suffix') return val==='…'?`${vc}_…`:`${vc}_${val}`;
  if(v==='custom')    return (input||'').replace(/\{masterCardCode\}/g,mc).replace(/\{variantCode\}/g,vc)||'…';
  return '';
}

    </div>
    <div class="dr-foot"><button class="btn-p">Save</button><button class="btn-s">Cancel</button></div>`;
}

/* ══ ACTIONS ══ */
function setL1(k){
  if(S.l1===k) return;
  S.l1=k;S.drawerOpen=false;S.selectedId=null;S.vfmtOpen=false;
  S.l2=k==='model'?'item-types':'all-products';
  render();
}
function setL2(id){
  if(S.l2===id) return;
  S.l2=id;S.drawerOpen=false;S.selectedId=null;S.vfmtOpen=false;
  render();
}
function openDrawer(id){
  S.selectedId=id;S.drawerOpen=true;S.itTab='general';S.vfmtOpen=false;
  renderCanvas();renderDrawer();
  requestAnimationFrame(()=>{
    document.getElementById('drHost').classList.add('open');
    requestAnimationFrame(()=>document.getElementById('drawer').classList.add('open'));
  });
}
function closeDrawer(){
  S.drawerOpen=false;S.selectedId=null;S.vfmtOpen=false;
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drHost').classList.remove('open');
  setTimeout(()=>renderCanvas(),310);
}
function setITTab(tab){S.itTab=tab;renderDrawer();}
function setVfmt(v){S.vfmt=v;S.vfmtOpen=false;S.vfmtInput='';renderDrawer();}
function setITVfmt(v){S.itVfmt=v;S.itVfmtOpen=false;S.itVfmtInput='';renderDrawer();}
function toggleITOverride(){
  S.itOverride=!S.itOverride;
  if(!S.itOverride){S.itVfmt='not-active';S.itVfmtInput='';S.itVfmtOpen=false;}
  renderDrawer();
}
function getEANChipValue(){
  const v=S.itOverride?S.itVfmt:S.vfmt;
  const i=S.itOverride?S.itVfmtInput:S.vfmtInput;
  const p=getHintPreview(v,i);
  return(p&&p!=='…')?p:'4012345678901';
}
document.addEventListener('click',()=>{
  const was=S.vfmtOpen||S.itVfmtOpen;
  S.vfmtOpen=false;S.itVfmtOpen=false;
  if(was)renderDrawer();
});

/* ══ BOOT ══ */
function render(){
  renderL1();renderSidebar();renderCanvas();
  if(S.drawerOpen){
    renderDrawer();
    document.getElementById('drHost').classList.add('open');
    document.getElementById('drawer').classList.add('open');
  } else {
    document.getElementById('drHost').classList.remove('open');
    document.getElementById('drawer').classList.remove('open');
  }
}
render();
</script>
